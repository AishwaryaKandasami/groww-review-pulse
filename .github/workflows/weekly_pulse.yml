name: Groww Weekly Review Pulse

on:
  schedule:
    # Runs at 00:30 UTC every Monday (which is 06:00 IST Monday)
    - cron: '30 0 * * 1'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    # Required to allow the script to commit the snapshot to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Stage 1 - Fetch Reviews
        run: python -m pipeline.fetch_reviews

      - name: Stage 2 - Clean and Rank
        run: python -m pipeline.clean_and_rank

      - name: Stage 3 - Theme Engine (Groq)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m pipeline.theme_engine
        continue-on-error: true

      - name: Stage 4 - Pulse Generator (Gemini + PDF)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m pipeline.pulse_generator
        
      - name: Stage 5 - Deliver Email & Commit Snapshot
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python -m pipeline.deliver_and_commit
